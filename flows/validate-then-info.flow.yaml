name: validate-then-info
description: 'Composability smoke flow within asyncapi-tools, proving an edge''s adapter resolves correctly through the compiler against this package''s REAL, registry-resolved schema (ValidateDocument -> ExtractInfo). This package''s nodes are independent text-in/facts-out analyzers of the SAME caller-supplied document text — none re-emits the document (unlike, e.g., a mutating transform node) — so ExtractInfo''s own content input here is a literal constant, not a field pass-through from ValidateDocument''s output. In a real agent pipeline these nodes are typically invoked in PARALLEL on the same source document rather than chained serially.'
nodes:
    - alias: validated
      package: christiangeorgelucas/asyncapi-tools@0.1.0
      node: ValidateDocument
      col: 0
      row: 0
    - alias: info
      package: christiangeorgelucas/asyncapi-tools@0.1.0
      node: ExtractInfo
      col: 1
      row: 0
edges:
    - from: validated
      to: info
      adapter:
        'literal(''asyncapi: 2.6.0\ninfo: {title: Smoke Test API, version: 1.0.0}\nchannels: {}'')': content
